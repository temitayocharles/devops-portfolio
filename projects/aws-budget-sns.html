<h1 id="aws-budget-alerts-via-sns">AWS Budget Alerts via SNS</h1>
<h2 id="overview">Overview</h2>
<p>Created a Terraform module to provision AWS Budgets and notify
subscribers through SNS and email alerts.</p>
<h2 id="features">Features</h2>
<ul>
<li>Threshold-based monthly budget alerts</li>
<li>Uses centralized YAML input ()</li>
<li>SNS topic with email subscription list</li>
</ul>
