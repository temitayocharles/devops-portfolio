<h1 id="automated-ec2-backup-ami-cleanup">Automated EC2 Backup &amp; AMI
Cleanup</h1>
<h2 id="overview">Overview</h2>
<p>Automated EC2 snapshot and AMI lifecycle cleanup using Lambda and
Terraform.</p>
<h2 id="features">Features</h2>
<ul>
<li>Snapshot creation and AMI retention policy</li>
<li>SNS alerts on success/failure</li>
<li>CloudWatch alarms for Lambda</li>
<li>Logs to SSM Parameter Store</li>
</ul>
