name: Auto Generate Portfolio Pages

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source
      uses: actions/checkout@v3

    - name: Set up Python for Pandoc (if needed)
      uses: actions/setup-python@v4
      with:
        python-version: 3.x

    - name: Install pandoc
      run: |
        sudo apt-get update
        sudo apt-get install -y pandoc

    - name: Convert .md to .html
      run: |
        for md in devops-portfolio/projects/*.md; do
          name=$(basename "$md" .md)
          pandoc "$md" -o "devops-portfolio/projects/$name.html"
        done

    - name: Regenerate index.html
      run: |
        chmod +x generate_index.sh
        ./generate_index.sh

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./devops-portfolio

