name: Auto Convert Markdown to HTML

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Convert all .md to .html
        run: |
          for md in devops-portfolio/projects/*.md; do
            name=$(basename "$md" .md)
            pandoc "$md" -o "devops-portfolio/projects/$name.html"
          done

      - name: Generate index.html
        run: |
          {
            echo "<!DOCTYPE html>"
            echo "<html><head><meta charset='UTF-8'><title>Charles Portfolio</title><link rel='stylesheet' href='../styles/style.css'></head><body>"
            echo "<main><h1>Charles — Senior DevOps Engineer</h1><h2>Project Portfolio</h2><ul>"
            for html in devops-portfolio/projects/*.html; do
              filename=$(basename "$html")
              name=$(basename "$html" .html | sed 's/-/ /g' | sed -e 's/\b\(.\)/\u\1/g')
              echo "<li><a href=\"projects/$filename\">$name</a></li>"
            done
            echo "</ul></main></body></html>"
          } > devops-portfolio/index.html

      - name: Commit changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add devops-portfolio/projects/*.html devops-portfolio/index.html
          git commit -m "CI: Auto-converted Markdown to HTML and updated index" || echo "No changes to commit"

      - name: Push to main
        uses: ad-m/github-push-action@v0.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
          force: true

